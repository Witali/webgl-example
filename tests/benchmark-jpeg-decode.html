<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>JPEG Decode Benchmark</title>
    <link rel="stylesheet" href="./visual-jpeg-compare.css">
  </head>
  <body>
    <main>
      <section class="gpu-warmup-panel" aria-label="GPU warmup">
        <canvas id="gpu-warmup-canvas" width="320" height="200"></canvas>
        <div class="gpu-warmup-copy">
          <strong>GPU warmup</strong>
          <span id="gpu-warmup-status">waiting</span>
        </div>
      </section>
      <section id="result" class="benchmark-output" aria-live="polite">
        BENCHMARK_RESULT_PENDING
      </section>
    </main>
    <script src="../src/decoders/gpu-jpeg.js"></script>
    <script src="../src/core/textured-cube.js?v=material-height"></script>
    <script src="../src/decoders/jpeg-js-decoder.js"></script>
    <script src="../src/decoders/webgpu-jpeg.js"></script>
    <script src="../src/decoders/webgpu-wgsl-jpeg.js"></script>
    <script src="../src/decoders/wasm-jpeg.js"></script>
    <script src="../src/decoders/wasm-gpu-jpeg.js"></script>
    <script src="../src/decoders/WebP-dec.js"></script>
    <script src="../src/decoders/webp-js-decoder.js"></script>
    <script src="../src/decoders/webp-decoder.js"></script>
    <script src="./benchmark-jpeg-decode.js?v=material-height"></script>
  </body>
</html>
