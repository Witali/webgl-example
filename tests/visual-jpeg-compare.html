<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JPEG Visual Compare</title>
    <link rel="stylesheet" href="./visual-jpeg-compare.css?v=pan-drag">
  </head>
  <body>
    <main>
      <header>
        <h1>JPEG Visual Compare</h1>
        <form id="controls">
          <label>
            Image
            <select id="image-url" name="image">
              <option value="../assets/stone-texture-small.jpg">stone-texture-small.jpg</option>
            </select>
          </label>
          <label>
            Decoder
            <select id="decoder" name="decoder">
              <option value="gpu">CPU-JS-Huff+GPU-IDCT</option>
              <option value="jpeg-js">CPU-JS-only</option>
              <option value="webgpu-wgsl">CPU-JS-Huff+WebGPU-WGSL-IDCT</option>
              <option value="webgpu">GPU-Huff+GPU-IDCT resident</option>
              <option value="webgpu-prescan">CPU-JS-Prescan+GPU-Huff+GPU-IDCT</option>
              <option value="wasm">CPU-WASM</option>
              <option value="wasm-gpu">CPU-WASM+GPU-IDCT</option>
              <option value="webp-js">WebP JS-only</option>
              <option value="webp-wasm">WebP CPU-WASM</option>
            </select>
          </label>
          <label class="range-label">
            <span>Diff contrast <output id="diff-scale-value" for="diff-scale">16x</output></span>
            <input id="diff-scale" name="diffScale" type="range" min="1" max="64" step="1" value="16">
          </label>
          <button id="upload-button" type="button">Upload image</button>
          <input id="image-file" type="file" accept="image/jpeg,image/webp,.jpg,.jpeg,.webp" hidden>
          <button type="submit">Decode</button>
        </form>
      </header>

      <section id="status" role="status">Ready</section>

      <section class="metrics" aria-label="comparison metrics">
        <div>
          <span>Size</span>
          <strong id="metric-size">-</strong>
        </div>
        <div>
          <span>Mismatched pixels</span>
          <strong id="metric-pixels">-</strong>
        </div>
        <div>
          <span>Max channel diff</span>
          <strong id="metric-max">-</strong>
        </div>
        <div>
          <span>Mean byte diff</span>
          <strong id="metric-mean">-</strong>
        </div>
      </section>

      <section class="decoder-timings" aria-label="selected decoder timing">
        <div class="section-heading">
          <h2>Selected decoder timing</h2>
          <span id="decoder-timing-summary">Waiting</span>
        </div>
        <div class="benchmark-table-wrap">
          <table class="decoder-timing-table">
            <thead>
              <tr>
                <th>Decoder</th>
                <th>Decode</th>
                <th>Total</th>
                <th>Status</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody id="decoder-timing-body">
              <tr>
                <td colspan="5">Decode the selected image to collect timing.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="canvases" aria-label="visual comparison">
        <figure>
          <figcaption>Browser</figcaption>
          <canvas id="browser-canvas"></canvas>
        </figure>
        <figure>
          <figcaption>Library</figcaption>
          <canvas id="library-canvas"></canvas>
        </figure>
        <figure>
          <figcaption>Diff <span id="diff-scale-caption">16x</span></figcaption>
          <canvas id="diff-canvas"></canvas>
        </figure>
      </section>
    </main>

    <script src="../src/decoders/gpu-jpeg.js"></script>
    <script src="../src/decoders/jpeg-js-decoder.js"></script>
    <script src="../src/decoders/webgpu-jpeg.js"></script>
    <script src="../src/decoders/webgpu-wgsl-jpeg.js"></script>
    <script src="../src/decoders/wasm-jpeg.js"></script>
    <script src="../src/decoders/wasm-gpu-jpeg.js"></script>
    <script src="../src/decoders/WebP-dec.js"></script>
    <script src="../src/decoders/webp-js-decoder.js"></script>
    <script src="../src/decoders/webp-decoder.js"></script>
    <script src="./visual-jpeg-compare.js?v=auto-image-change"></script>
  </body>
</html>
